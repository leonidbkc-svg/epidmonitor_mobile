<!DOCTYPE html>
<html lang="ru">

<head>

<meta charset="UTF-8">

<title>EpidMonitor</title>

<link rel="manifest" href="/static/manifest.json">

<meta name="apple-mobile-web-app-capable" content="yes">

<body>

EpidMonitor
</div>

<p>
в мобильную версию цифровой платформы<br>

Включить уведомления

</div>

<div class="card" onclick="openModule('Персонал')">

</div>

<div class="card" onclick="openModule('Настройки')">

</div>
